<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAY WHAT... | The Generational Translator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="labubu-container">
        <header>
            <h1 class="logo">SAY<span>WHAT...</span></h1>
            <div class="tagline">The Generational Translator</div>
        </header>

        <div class="search-section">
            <div class="input-wrapper">
                <input type="text" id="word-input" placeholder="Type slang here..." autocomplete="off">
                <div id="clear-input-btn" class="input-clear-x">×</div>
            </div>

            <div class="trending-container">
                <span class="trending-label">HOT NOW:</span>
                <div id="trending-list" class="trending-list">
                    </div>
            </div>

            <div class="button-group">
                <button id="search-btn">CHOMP</button>
                <button id="random-btn">✨ SURPRISE</button>
            </div>
        </div>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
        </div>

        <div id="result-display" class="toy-box-card hidden">
            <div class="card-top">
                <span id="gen-badge" class="tagline">GEN Z</span>
                <h2 id="display-term">TERM</h2>
            </div>

            <div class="definition-area">
                <p id="display-definition"></p>
            </div>

            <div class="bridge-container">
                <div class="bridge-row">
                    <div class="bridge-item">
                        <span class="bridge-label">CLASSIC (BOOMER)</span>
                        <div id="bridge-old">...</div>
                    </div>
                    <div class="bridge-arrow">➡</div>
                    <div class="bridge-item">
                        <span class="bridge-label">MODERN (SLANG)</span>
                        <div id="bridge-new">...</div>
                    </div>
                </div>
            </div>

            <div id="extra-info"></div>

            <div class="example-section">
                <p id="display-example"></p>
            </div>
        </div>

        <div class="history-section">
            <div id="history-bar" class="history-bar"></div>
            <button id="clear-history-btn" class="hidden">RESET FEED</button>
        </div>

        <footer>
            POWERED BY BRAINROT ENGINE 2026
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
